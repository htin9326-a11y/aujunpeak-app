services:
  # === API Server (Web Service) ===
  - type: web
    name: aujunpeak-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # === Static Site (Frontend) ===
  - type: web
    name: aujunpeak-app
    env: static
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/aujunpeak run build
    staticPublishPath: ./artifacts/aujunpeak/dist
